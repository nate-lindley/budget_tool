<div class="modal fade" id="addContributionModal" tabindex="-1" aria-labelledby="addContributionLabel" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <form method="post" id="addContributionForm">
                {% csrf_token %}
                <div class="modal-header">
                    <h5 class="modal-title" id="addContributionLabel">Add Contribution</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <div class="mb-3">
                        <label for="contributionAmount" class="form-label">Amount</label>
                        <input type="number" step="0.01" class="form-control" id="contributionAmount" name="amount" required>
                    </div>
                    <div class="mb-3">
                        <label for="contributionDate" class="form-label">Date</label>
                        <input type="date" class="form-control" id="contributionDate" name="date" value="{{ today }}" required>
                    </div>
                    <div class="mb-3">
                        <label for="contributionNote" class="form-label">Note</label>
                        <input type="text" class="form-control" id="contributionNote" name="note" placeholder="Optional">
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="submit" class="btn btn-primary">Save Contribution</button>
                </div>
            </form>
        </div>
    </div>
</div>
