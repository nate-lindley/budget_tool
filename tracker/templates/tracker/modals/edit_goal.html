<div class="modal fade" id="editGoalModal" tabindex="-1" aria-labelledby="editGoalLabel" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <form method="post" id="editGoalForm">
                {% csrf_token %}
                <div class="modal-header">
                    <h5 class="modal-title" id="editGoalLabel">Edit Savings Goal</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <div class="mb-3">
                        <label for="editGoalName" class="form-label">Goal Name</label>
                        <input type="text" class="form-control" id="editGoalName" name="name" required>
                    </div>
                    <div class="mb-3">
                        <label for="editGoalTarget" class="form-label">Target Amount</label>
                        <input type="number" step="0.01" class="form-control" id="editGoalTarget" name="target_amount" required>
                    </div>
                    <div class="row g-2 mb-3">
                        <div class="col-sm-6">
                            <label for="editGoalPriority" class="form-label">Fill Priority</label>
                            <input type="number" min="1" class="form-control" id="editGoalPriority" name="priority" value="1">
                            <small class="text-muted">Lower = filled first</small>
                        </div>
                        <div class="col-sm-6">
                            <label for="editGoalWithdrawalPriority" class="form-label">Withdrawal Priority</label>
                            <input type="number" min="1" class="form-control" id="editGoalWithdrawalPriority" name="withdrawal_priority" value="1">
                            <small class="text-muted">Lower = depleted first</small>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label for="editGoalDeadline" class="form-label">Deadline</label>
                        <input type="date" class="form-control" id="editGoalDeadline" name="deadline">
                    </div>
                    <div class="mb-3 form-check">
                        <input type="checkbox" class="form-check-input" id="editGoalActive" name="is_active" checked>
                        <label class="form-check-label" for="editGoalActive">Active</label>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="submit" class="btn btn-primary">Update Goal</button>
                </div>
            </form>
        </div>
    </div>
</div>
