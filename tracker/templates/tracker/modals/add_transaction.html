
    <div class="modal fade" id="addTransactionModal" tabindex="-1" aria-labelledby="addTransactionLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <form method="post" action="{% url 'add_transaction' %}">
                    {% csrf_token %}
                    <div class="modal-header">
                        <h5 class="modal-title" id="addTransactionLabel">Add New Transaction</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    <div class="modal-body">
                        <div class="mb-3">
                            <label for="description" class="form-label">Description</label>
                            <input type="text" class="form-control" id="description" name="description" required>
                        </div>
                        <div class="row g-2 mb-3">
                            <div class="col-sm-6">
                                <label for="amount" class="form-label">Amount</label>
                                <input type="text" class="form-control" id="amount" name="amount" required>
                            </div>
                            <div class="col-sm-6">
                                <label for="reimbursement" class="form-label">Reimbursement</label>
                                <input type="text" class="form-control" id="reimbursement" name="reimbursement" placeholder="Optional">
                            </div>
                        </div>
                        <div class="mb-3">
                            <label for="date" class="form-label">Date</label>
                            <input type="date" class="form-control" id="date" name="date" value="{{ today }}" required>
                        </div>
                        <div class="mb-3">
                            <label for="category" class="form-label">Category</label>
                            <select class="form-select" id="category" name="category" required>
                                <option value="" disabled selected>Select a category</option>
                                {% for category in categories %}
                                    <option value="{{ category.id }}">{{ category.name }}</option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="mb-3">
                            <label for="source" class="form-label">Source</label>
                            <select class="form-select" id="source" name="source" required>
                                <option value="" disabled selected>Select a source</option>
                                {% for source in sources %}
                                    <option value="{{ source.id }}">{{ source.name }}</option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="mb-3">
                            <label for="tags" class="form-label">Tags</label>
                            <input type="text" class="form-control" id="tags" name="tags" placeholder="e.g. business, travel">
                        </div>
                        <div class="mb-3">
                            <label for="notes" class="form-label">Notes</label>
                            <textarea class="form-control" id="notes" name="notes" rows="2" placeholder="Optional"></textarea>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                        <button type="submit" class="btn btn-primary">Save Transaction</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
    <script>
        document.querySelector('#addTransactionModal form').addEventListener('submit', function(e) {
          const amountInput = document.getElementById('amount');
          const reimbursementInput = document.getElementById('reimbursement');
          const originalValue = amountInput.value;
          const reimbursementValue = reimbursementInput.value;
        
          try {
            // Only allow safe characters: numbers, + - * / . and spaces
            if (!/^[\d\s+\-*/.()]+$/.test(originalValue)) {
              throw new Error("Invalid characters in amount.");
            }
        
            // Safely evaluate the expression
            const evaluated = Function('"use strict"; return (' + originalValue + ')')();
        
            if (isNaN(evaluated) || !isFinite(evaluated)) {
              throw new Error("Invalid math expression.");
            }
        
            // Round to 2 decimal places and set it
            amountInput.value = parseFloat(evaluated).toFixed(2);
          } catch (error) {
            e.preventDefault();
            alert("Please enter a valid math expression for the amount.");
          }

          if (!reimbursementValue) {
            return;
          }

          try {
            if (!/^[\d\s+\-*/.()]+$/.test(reimbursementValue)) {
              throw new Error("Invalid characters in reimbursement.");
            }

            const evaluatedReimbursement = Function('"use strict"; return (' + reimbursementValue + ')')();

            if (isNaN(evaluatedReimbursement) || !isFinite(evaluatedReimbursement)) {
              throw new Error("Invalid math expression.");
            }

            reimbursementInput.value = parseFloat(evaluatedReimbursement).toFixed(2);
          } catch (error) {
            e.preventDefault();
            alert("Please enter a valid math expression for the reimbursement.");
          }
        });
        </script>
