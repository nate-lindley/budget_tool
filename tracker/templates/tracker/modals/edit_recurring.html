<div class="modal fade" id="editRecurringModal" tabindex="-1" aria-labelledby="editRecurringLabel" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <form method="post" id="editRecurringForm">
                {% csrf_token %}
                <div class="modal-header">
                    <h5 class="modal-title" id="editRecurringLabel">Edit Recurring Transaction</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <div class="mb-3">
                        <label for="editRecurringDescription" class="form-label">Description</label>
                        <input type="text" class="form-control" id="editRecurringDescription" name="description" required>
                    </div>
                    <div class="mb-3">
                        <label for="editRecurringAmount" class="form-label">Amount</label>
                        <input type="text" class="form-control" id="editRecurringAmount" name="amount" required>
                    </div>
                    <div class="mb-3">
                        <label for="editRecurringCategory" class="form-label">Category</label>
                        <select class="form-select" id="editRecurringCategory" name="category">
                            <option value="">None</option>
                            {% for category in categories %}
                                <option value="{{ category.id }}">{{ category.name }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="mb-3">
                        <label for="editRecurringSource" class="form-label">Source</label>
                        <select class="form-select" id="editRecurringSource" name="source">
                            <option value="">None</option>
                            {% for source in sources %}
                                <option value="{{ source.id }}">{{ source.name }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="row g-2 mb-3">
                        <div class="col-sm-4">
                            <label for="editRecurringInterval" class="form-label">Every</label>
                            <input type="number" class="form-control" id="editRecurringInterval" name="interval" value="1" min="1">
                        </div>
                        <div class="col-sm-8">
                            <label for="editRecurringFrequency" class="form-label">Frequency</label>
                            <select class="form-select" id="editRecurringFrequency" name="frequency">
                                <option value="weekly">Weeks</option>
                                <option value="monthly">Months</option>
                                <option value="yearly">Years</option>
                            </select>
                        </div>
                    </div>
                    <div class="mb-3" id="editRecurringDayOfMonthGroup">
                        <label for="editRecurringDayOfMonth" class="form-label">Day of Month</label>
                        <input type="number" class="form-control" id="editRecurringDayOfMonth" name="day_of_month" value="1" min="1" max="31">
                    </div>
                    <div class="mb-3" id="editRecurringDayOfWeekGroup" style="display:none;">
                        <label for="editRecurringDayOfWeek" class="form-label">Day of Week</label>
                        <select class="form-select" id="editRecurringDayOfWeek" name="day_of_week">
                            <option value="0">Monday</option>
                            <option value="1">Tuesday</option>
                            <option value="2">Wednesday</option>
                            <option value="3">Thursday</option>
                            <option value="4">Friday</option>
                            <option value="5">Saturday</option>
                            <option value="6">Sunday</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label for="editRecurringStartDate" class="form-label">Start Date</label>
                        <input type="date" class="form-control" id="editRecurringStartDate" name="start_date" required>
                    </div>
                    <div class="mb-3">
                        <label for="editRecurringEndDate" class="form-label">End Date (optional)</label>
                        <input type="date" class="form-control" id="editRecurringEndDate" name="end_date">
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="submit" class="btn btn-primary">Save Changes</button>
                </div>
            </form>
        </div>
    </div>
</div>
<script>
document.addEventListener('DOMContentLoaded', function () {
    const freqSelect = document.getElementById('editRecurringFrequency');
    const dayOfMonthGroup = document.getElementById('editRecurringDayOfMonthGroup');
    const dayOfWeekGroup = document.getElementById('editRecurringDayOfWeekGroup');

    if (freqSelect) {
        freqSelect.addEventListener('change', function () {
            if (this.value === 'weekly') {
                dayOfMonthGroup.style.display = 'none';
                dayOfWeekGroup.style.display = '';
            } else {
                dayOfMonthGroup.style.display = '';
                dayOfWeekGroup.style.display = 'none';
            }
        });
    }

    const editRecurringForm = document.getElementById('editRecurringForm');
    if (editRecurringForm) {
        editRecurringForm.addEventListener('submit', function(e) {
            const amountInput = document.getElementById('editRecurringAmount');
            const originalValue = amountInput.value;
            try {
                if (!/^[\d\s+\-*/.()]+$/.test(originalValue)) {
                    throw new Error("Invalid characters in amount.");
                }
                const evaluated = Function('"use strict"; return (' + originalValue + ')')();
                if (isNaN(evaluated) || !isFinite(evaluated)) {
                    throw new Error("Invalid math expression.");
                }
                amountInput.value = parseFloat(evaluated).toFixed(2);
            } catch (error) {
                e.preventDefault();
                alert("Please enter a valid math expression for the amount.");
            }
        });
    }
});
</script>
