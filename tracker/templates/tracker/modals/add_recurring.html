<div class="modal fade" id="addRecurringModal" tabindex="-1" aria-labelledby="addRecurringLabel" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <form method="post" action="{% url 'add_recurring' %}" id="addRecurringForm">
                {% csrf_token %}
                <div class="modal-header">
                    <h5 class="modal-title" id="addRecurringLabel">Add Recurring Transaction</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <div class="mb-3">
                        <label for="addRecurringDescription" class="form-label">Description</label>
                        <input type="text" class="form-control" id="addRecurringDescription" name="description" required>
                    </div>
                    <div class="mb-3">
                        <label for="addRecurringAmount" class="form-label">Amount</label>
                        <input type="text" class="form-control" id="addRecurringAmount" name="amount" required>
                    </div>
                    <div class="mb-3">
                        <label for="addRecurringCategory" class="form-label">Category</label>
                        <select class="form-select" id="addRecurringCategory" name="category">
                            <option value="" selected>None</option>
                            {% for category in categories %}
                                <option value="{{ category.id }}">{{ category.name }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="mb-3">
                        <label for="addRecurringSource" class="form-label">Source</label>
                        <select class="form-select" id="addRecurringSource" name="source">
                            <option value="" selected>None</option>
                            {% for source in sources %}
                                <option value="{{ source.id }}">{{ source.name }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="row g-2 mb-3">
                        <div class="col-sm-4">
                            <label for="addRecurringInterval" class="form-label">Every</label>
                            <input type="number" class="form-control" id="addRecurringInterval" name="interval" value="1" min="1">
                        </div>
                        <div class="col-sm-8">
                            <label for="addRecurringFrequency" class="form-label">Frequency</label>
                            <select class="form-select" id="addRecurringFrequency" name="frequency">
                                <option value="weekly">Weeks</option>
                                <option value="monthly" selected>Months</option>
                                <option value="yearly">Years</option>
                            </select>
                        </div>
                    </div>
                    <div class="mb-3" id="addRecurringDayOfMonthGroup">
                        <label for="addRecurringDayOfMonth" class="form-label">Day of Month</label>
                        <input type="number" class="form-control" id="addRecurringDayOfMonth" name="day_of_month" value="1" min="1" max="31">
                    </div>
                    <div class="mb-3" id="addRecurringDayOfWeekGroup" style="display:none;">
                        <label for="addRecurringDayOfWeek" class="form-label">Day of Week</label>
                        <select class="form-select" id="addRecurringDayOfWeek" name="day_of_week">
                            <option value="0">Monday</option>
                            <option value="1">Tuesday</option>
                            <option value="2">Wednesday</option>
                            <option value="3">Thursday</option>
                            <option value="4">Friday</option>
                            <option value="5">Saturday</option>
                            <option value="6">Sunday</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label for="addRecurringStartDate" class="form-label">Start Date</label>
                        <input type="date" class="form-control" id="addRecurringStartDate" name="start_date" value="{{ today }}" required>
                    </div>
                    <div class="mb-3">
                        <label for="addRecurringEndDate" class="form-label">End Date (optional)</label>
                        <input type="date" class="form-control" id="addRecurringEndDate" name="end_date">
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="submit" class="btn btn-primary">Save</button>
                </div>
            </form>
        </div>
    </div>
</div>
<script>
document.addEventListener('DOMContentLoaded', function () {
    const freqSelect = document.getElementById('addRecurringFrequency');
    const dayOfMonthGroup = document.getElementById('addRecurringDayOfMonthGroup');
    const dayOfWeekGroup = document.getElementById('addRecurringDayOfWeekGroup');

    if (freqSelect) {
        freqSelect.addEventListener('change', function () {
            if (this.value === 'weekly') {
                dayOfMonthGroup.style.display = 'none';
                dayOfWeekGroup.style.display = '';
            } else {
                dayOfMonthGroup.style.display = '';
                dayOfWeekGroup.style.display = 'none';
            }
        });
    }

    const addRecurringForm = document.getElementById('addRecurringForm');
    if (addRecurringForm) {
        addRecurringForm.addEventListener('submit', function(e) {
            const amountInput = document.getElementById('addRecurringAmount');
            const originalValue = amountInput.value;
            try {
                if (!/^[\d\s+\-*/.()]+$/.test(originalValue)) {
                    throw new Error("Invalid characters in amount.");
                }
                const evaluated = Function('"use strict"; return (' + originalValue + ')')();
                if (isNaN(evaluated) || !isFinite(evaluated)) {
                    throw new Error("Invalid math expression.");
                }
                amountInput.value = parseFloat(evaluated).toFixed(2);
            } catch (error) {
                e.preventDefault();
                alert("Please enter a valid math expression for the amount.");
            }
        });
    }
});
</script>
