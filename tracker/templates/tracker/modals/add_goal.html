<div class="modal fade" id="addGoalModal" tabindex="-1" aria-labelledby="addGoalLabel" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <form method="post" action="{% url 'add_goal' %}">
                {% csrf_token %}
                <div class="modal-header">
                    <h5 class="modal-title" id="addGoalLabel">Add Savings Goal</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <div class="mb-3">
                        <label for="goalName" class="form-label">Goal Name</label>
                        <input type="text" class="form-control" id="goalName" name="name" required placeholder="e.g. Emergency Fund">
                    </div>
                    <div class="mb-3">
                        <label for="goalTarget" class="form-label">Target Amount</label>
                        <input type="number" step="0.01" class="form-control" id="goalTarget" name="target_amount" required>
                    </div>
                    <div class="row g-2 mb-3">
                        <div class="col-sm-6">
                            <label for="goalPriority" class="form-label">Fill Priority</label>
                            <input type="number" min="1" class="form-control" id="goalPriority" name="priority" value="1">
                            <small class="text-muted">Lower = filled first</small>
                        </div>
                        <div class="col-sm-6">
                            <label for="goalWithdrawalPriority" class="form-label">Withdrawal Priority</label>
                            <input type="number" min="1" class="form-control" id="goalWithdrawalPriority" name="withdrawal_priority" value="1">
                            <small class="text-muted">Lower = depleted first</small>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label for="goalDeadline" class="form-label">Deadline</label>
                        <input type="date" class="form-control" id="goalDeadline" name="deadline">
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="submit" class="btn btn-primary">Save Goal</button>
                </div>
            </form>
        </div>
    </div>
</div>
